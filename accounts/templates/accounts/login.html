{% extends "portfolio/base.html" %}
{% block content %}
<h2>Login</h2>
<section>
  <article>
    <h3>Login com username e password</h3>
    <form method="post">
      {% csrf_token %}
      <p>
        <label>Username:</label>
        <input type="text" name="username">
      </p>
      <p>
        <label>Password:</label>
        <input type="password" name="password">
      </p>
      {% if erro %}
        <p style="color:red;">{{ erro }}</p>
      {% endif %}
      <button type="submit">Entrar</button>
    </form>
    <p>Não tens conta? <a href="{% url 'registo' %}">Regista-te aqui</a></p>
  </article>

  <article>
    <h3>Login com link mágico</h3>
    <form method="post" action="{% url 'magic_link' %}">
      {% csrf_token %}
      <p>
        <label>Email:</label>
        <input type="email" name="email">
      </p>
      {% if erro_magic %}
        <p style="color:red;">{{ erro_magic }}</p>
      {% endif %}
      <button type="submit">Enviar link mágico</button>
    </form>
  </article>
</section>
{% endblock %}
